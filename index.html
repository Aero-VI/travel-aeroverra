<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Verification Tool</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🌍 Travel Data Viewer</h1>
        <nav>
            <button class="nav-btn active" data-view="timeline">Timeline</button>
            <button class="nav-btn" data-view="table">Table</button>
            <button class="nav-btn" data-view="gaps">Gaps & Issues</button>
        </nav>
    </header>

    <main>
        <div id="timeline-view" class="view active"></div>
        <div id="table-view" class="view"></div>
        <div id="gaps-view" class="view"></div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
