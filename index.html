<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Verification Tool</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>🌍 Travel Data Verification</h1>
        <div id="stats-bar"></div>
        <div id="gap-alerts"></div>
        <nav class="view-nav">
            <button class="toggle-btn active" data-view="table">📋 Table</button>
            <button class="toggle-btn" data-view="timeline">📅 Timeline</button>
            <button class="toggle-btn" data-view="gaps">⚠️ Gaps</button>
        </nav>
        <div class="filters">
            <input type="text" id="search-input" placeholder="Search trips, cities, booking refs...">
            <select id="year-filter"><option value="all">All Years</option></select>
            <select id="type-filter">
                <option value="all">All Types</option>
                <option value="Cruise">Cruise</option>
                <option value="Flight">Flight</option>
                <option value="Train">Train</option>
                <option value="Bus">Bus</option>
                <option value="Accommodation">Accommodation</option>
            </select>
            <select id="source-filter">
                <option value="all">All Sources</option>
                <option value="email">Email Verified</option>
                <option value="inferred">Inferred</option>
                <option value="manual">Manual</option>
            </select>
        </div>
    </header>

    <main>
        <div id="table-view" class="view-panel active">
            <div id="table-wrapper"></div>
        </div>
        <div id="timeline-view" class="view-panel">
            <div id="timeline-container"></div>
        </div>
        <div id="gaps-view" class="view-panel">
            <div id="gaps-container"></div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
