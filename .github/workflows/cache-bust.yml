name: Cache Bust

on:
  push:
    branches: [main]

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate cache bust hash
        run: |
          # Use short git SHA as cache buster
          HASH=$(git rev-parse --short HEAD)
          echo "CACHE_HASH=$HASH" >> $GITHUB_ENV
          echo "Cache bust hash: $HASH"

      - name: Update index.html with content hashes
        run: |
          # Replace any existing ?v=XXX or ?h=XXX with content-based hashes
          for file in css/style.css js/app.js js/geocode.js js/globe.js data/trips.json; do
            if [ -f "$file" ]; then
              # Generate MD5 of the actual file content (first 8 chars)
              FILE_HASH=$(md5sum "$file" | cut -c1-8)
              # Escape dots and slashes for sed
              ESCAPED=$(echo "$file" | sed 's/\./\\./g' | sed 's/\//\\\//g')
              # Replace href="file?v=anything" or href="file?h=anything" or href="file" (no query)
              sed -i -E "s|(${ESCAPED})\?[vh]=[a-zA-Z0-9]+|\1?h=${FILE_HASH}|g" index.html
              # Also catch cases where there's no query string yet
              sed -i -E "s|(${ESCAPED})\"|\1?h=${FILE_HASH}\"|g" index.html
              echo "$file -> ?h=$FILE_HASH"
            fi
          done
          
          echo "--- Updated index.html ---"
          grep -E "\.(js|css|json)" index.html | head -20

      - name: Commit and push if changed
        run: |
          git config user.name "Azula"
          git config user.email "azula@aero.vi"
          git diff --quiet index.html && echo "No changes" && exit 0
          git add index.html
          git commit -m "chore: auto cache-bust [skip ci]"
          git push
