name: Cache Bust

on:
  push:
    branches: [main]

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update all cache bust hashes
        run: |
          # Hash files referenced in index.html (CSS, JS)
          for file in css/style.css js/app.js js/geocode.js js/globe.js; do
            if [ -f "$file" ]; then
              FILE_HASH=$(md5sum "$file" | cut -c1-8)
              ESCAPED=$(echo "$file" | sed 's/\./\\./g' | sed 's/\//\\\//g')
              sed -i -E "s|(${ESCAPED})\?[vh]=[a-zA-Z0-9]+|\1?h=${FILE_HASH}|g" index.html
              sed -i -E "s|(${ESCAPED})\"|\1?h=${FILE_HASH}\"|g" index.html
              echo "index.html: $file -> ?h=$FILE_HASH"
            fi
          done

          # Hash data files referenced inside JS (trips.json, events.json, etc.)
          for datafile in data/trips.json data/events.json; do
            if [ -f "$datafile" ]; then
              DATA_HASH=$(md5sum "$datafile" | cut -c1-8)
              ESCAPED=$(echo "$datafile" | sed 's/\./\\./g' | sed 's/\//\\\//g')
              # Update references in all JS files
              for jsfile in js/app.js js/globe.js js/geocode.js; do
                if [ -f "$jsfile" ]; then
                  sed -i -E "s|(${ESCAPED})\?[vh]=[a-zA-Z0-9]+|\1?h=${DATA_HASH}|g" "$jsfile"
                  if grep -qP "${ESCAPED}(?!\?)" "$jsfile" 2>/dev/null; then
                    sed -i -E "s|(${ESCAPED})'|\1?h=${DATA_HASH}'|g" "$jsfile"
                    sed -i -E "s|(${ESCAPED})\"|\1?h=${DATA_HASH}\"|g" "$jsfile"
                  fi
                  echo "$jsfile: $datafile -> ?h=$DATA_HASH"
                fi
              done
            fi
          done

          echo "--- Updated references ---"
          grep -E '\.(js|css|json)' index.html | head -20
          grep -E 'trips\.json|events\.json' js/app.js | head -10

      - name: Commit and push if changed
        run: |
          git config user.name "Azula"
          git config user.email "azula@aero.vi"
          git diff --quiet && echo "No changes" && exit 0
          git add -A
          git commit -m "chore: auto cache-bust [skip ci]"
          git push
